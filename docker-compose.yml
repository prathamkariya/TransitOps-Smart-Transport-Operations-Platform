services:
  postgres:
    image: postgres:15-alpine
    container_name: transitops-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: odo_hackathon_secure_pass
      POSTGRES_DB: transitops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - transitops-network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transitops-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:odo_hackathon_secure_pass@postgres:5432/transitops
      - JWT_SECRET=super_secret_hackathon_key_change_in_production
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
    networks:
      - transitops-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transitops-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - transitops-network

volumes:
  postgres_data:

networks:
  transitops-network:
    driver: bridge
